apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-grafana-longhorn
  namespace: grafana-longhorn-db
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  primaryUpdateStrategy: unsupervised
  bootstrap:
    initdb:
      database: grafana
      owner: grafana
      secret:
        name: grafana-secret
  storage:
    size: 20Gi
    storageClass: longhorn-2
