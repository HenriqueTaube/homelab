background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 6
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(205, 214, 244, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d/%m')"
    color = rgba(205, 214, 244, 0.9)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 260, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(137, 180, 250, 1.0)
    inner_color = rgba(30, 30, 46, 0.9)
    font_color = rgba(205, 214, 244, 1.0)
    placeholder_text = Senha...
    position = 0, -40
    halign = center
    valign = center
}
